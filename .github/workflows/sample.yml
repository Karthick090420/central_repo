name: Claude Skill Workflow

on:
  workflow_dispatch:
    inputs:
      github_url:
        description: 'GitHub Repository URL'
        required: true
        type: string

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Repository
        run: |
         REPO_NAME=$(basename "${{ github.event.inputs.github_url }}" .git)

          if [ "$REPO_NAME" != "central_repo" ]; then
            echo "Invalid repository: $REPO_NAME"
            exit 1
          fi
          echo "REPO_NAME=$REPO_NAME" >> $GITHUB_ENV
          
      - name: Setup Python 
        uses: actions/setup-python@v5 
        with: 
           python-version: '3.11'
          
      - name: Install Dependencies
        run: | 
           pip install anthropic
      
      - name: Clone Target Repository 
        run: | 
           git clone "${{ github.event.inputs.github_url }}" target_repo 
      
      - name: Authenticate Claude 
        env: 
           CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }} 
        run: | 
          python generate_docs.py
    
      - name: Upload Documentation
        uses: actions/upload-artifact@v4
        with:
          name: generated-documentation
          path: AI_DOCUMENTATION.md
