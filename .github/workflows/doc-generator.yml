name: Reusable AI Documentation Workflow

on:
 workflow_call:

jobs:
  generate-docs: 
  runs-on:  ubuntu-latest

  steps:
     - name: Checkout Source Code
       uses: actions/checkout@v4
  
     - name: Get Git Difference
       run: |
        git diff HEAD~1 HEAD > diff.txt
  
     - name: Display Diff
       run: |
        cat diff.txt
  
     - name: Generate Documentation
       run: |
        DIFF_CONTENT=$(cat diff.txt)
  
        echo "AI Documentation Generated" > GENERATED_DOC.md
        echo "" >> GENERATED_DOC.md
        echo "$DIFF_CONTENT" >> GENERATED_DOC.md
  
     - name: Upload Generated Documentation
       uses: actions/upload-artifact@v4
       with:
       name: generated-documentation
      path: GENERATED_DOC.md

